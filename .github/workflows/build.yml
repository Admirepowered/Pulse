name: Build

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit Frontend Dependencies
        working-directory: frontend
        run: npm audit --audit-level=moderate

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Test Go
        run: go test ./...

      - name: Resolve Version
        id: version
        shell: pwsh
        run: |
          $count = (git rev-list --count HEAD).Trim()
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $version = $env:GITHUB_REF_NAME.TrimStart("v")
          } else {
            $version = "0.0.$count"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "build_number=$count" >> $env:GITHUB_OUTPUT
          Write-Host "Pulse version $version ($count)"

      - name: Build Wails App
        shell: pwsh
        run: |
          $name = "Pulse-${{ steps.version.outputs.version }}.${{ steps.version.outputs.build_number }}-windows-amd64.exe"
          wails build -ldflags "-X Pulse/internal/pulse.AppVersion=${{ steps.version.outputs.version }} -X Pulse/internal/pulse.BuildNumber=${{ steps.version.outputs.build_number }}" -o $name
          "artifact_name=$name" >> $env:GITHUB_ENV

      - name: Setup UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Compress Windows Executable
        shell: pwsh
        run: upx --best --lzma "build/bin/$env:artifact_name"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pulse-${{ steps.version.outputs.version }}.${{ steps.version.outputs.build_number }}-windows-amd64
          path: build/bin/${{ env.artifact_name }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/${{ env.artifact_name }}
          generate_release_notes: true
