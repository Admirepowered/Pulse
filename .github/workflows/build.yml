name: Build

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: build-windows
            print: print-windows-artifact
            kind: windows
          - name: Windows x86
            os: windows-latest
            target: build-windows-386
            print: print-windows-386-artifact
            kind: windows
          - name: Linux Ubuntu 22.04 x64
            os: ubuntu-22.04
            target: build-linux-ubuntu22
            print: print-linux-ubuntu22-artifact
            webkit: '4.0'
            webkit_package: libwebkit2gtk-4.0-dev
            kind: linux
          - name: Linux Ubuntu 24.04 x64
            os: ubuntu-24.04
            target: build-linux-ubuntu24
            print: print-linux-ubuntu24-artifact
            webkit: '4.1'
            webkit_package: libwebkit2gtk-4.1-dev
            kind: linux
          - name: macOS ARM64
            os: macos-14
            target: build-macos-arm64
            print: print-macos-arm64-artifact
            kind: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            xvfb \
            libgtk-3-dev \
            ${{ matrix.webkit_package }} \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Make
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install make -y --no-progress

      - name: Setup UPX
        if: runner.os == 'Windows'
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit Frontend Dependencies
        if: runner.os == 'Windows'
        working-directory: frontend
        run: npm audit --audit-level=moderate

      - name: Build Frontend For Tests
        if: runner.os == 'Windows'
        working-directory: frontend
        run: npm run build

      - name: Test Go
        if: runner.os == 'Windows'
        run: go test ./...

      - name: Resolve Artifact Name
        id: artifact
        shell: bash
        run: |
          name="$(make ${{ matrix.print }})"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Build Wails App
        if: runner.os != 'Linux'
        shell: bash
        run: make ${{ matrix.target }}

      - name: Build Wails App
        if: runner.os == 'Linux'
        shell: bash
        run: xvfb-run -a make ${{ matrix.target }}

      - name: Package Artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          name="${{ steps.artifact.outputs.name }}"
          case "${{ matrix.kind }}" in
            windows)
              (cd build/bin && zip -q "../../release/$name.zip" "$name")
              ;;
            linux)
              chmod +x "build/bin/$name"
              tar -C build/bin -czf "release/$name.tar.gz" "$name"
              ;;
            macos)
              app_dir="$(find build/bin -maxdepth 1 -name '*.app' -type d | head -n 1)"
              if [ -n "$app_dir" ]; then
                (cd build/bin && zip -qry "../../release/$name.zip" "$(basename "$app_dir")")
              else
                cp "build/bin/$name" "release/$name"
              fi
              ;;
          esac

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            release/*.zip
            release/*.tar.gz
          if-no-files-found: error

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List Release Files
        run: ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
