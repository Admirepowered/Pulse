name: Build Android

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Prepare Android SDK
        shell: bash
        run: |
          set -euo pipefail
          set +o pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          set -o pipefail
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;23.2.8568313"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/23.2.8568313" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/23.2.8568313" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build Go core
        shell: bash
        run: |
          chmod +x android/native/build-android.sh android/native/collect-binaries.sh
          android/native/build-android.sh
          android/native/collect-binaries.sh

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: android

      - name: Configure Android SDK path
        shell: bash
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> android/local.properties

      - name: Build APK
        working-directory: android
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign Release
        if: ${{ env.SIGNING_KEY != '' }}
        continue-on-error: true
        uses: kevin-david/zipalign-sign-android-release@v2
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ env.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          zipAlign: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: pulse-android-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload native core artifact
        uses: actions/upload-artifact@v5
        with:
          name: pulse-android-native-core
          path: android/native/build/arm64-v8a/libpulsecore.so
          if-no-files-found: error
          retention-days: 30
