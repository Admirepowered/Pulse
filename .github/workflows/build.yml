name: Build

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            target: build-windows build-windows-386
            print: ''
            kind: windows
          - name: Linux Ubuntu 22.04 x64
            os: ubuntu-22.04
            target: build-linux-ubuntu22
            print: print-linux-ubuntu22-artifact
            webkit: '4.0'
            webkit_package: libwebkit2gtk-4.0-dev
            kind: linux
          - name: Linux Ubuntu 24.04 x64
            os: ubuntu-24.04
            target: build-linux-ubuntu24
            print: print-linux-ubuntu24-artifact
            webkit: '4.1'
            webkit_package: libwebkit2gtk-4.1-dev
            kind: linux
          - name: macOS ARM64
            os: macos-14
            target: build-macos-arm64
            print: print-macos-arm64-artifact
            kind: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            xvfb \
            libgtk-3-dev \
            ${{ matrix.webkit_package }} \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Make
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install make -y --no-progress

      - name: Setup 7z
        if: runner.os == 'macOS'
        run: brew install p7zip

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit Frontend Dependencies
        if: runner.os == 'Windows'
        working-directory: frontend
        run: npm audit --audit-level=moderate

      - name: Build Frontend For Tests
        if: runner.os == 'Windows'
        working-directory: frontend
        run: npm run build

      - name: Test Go
        if: runner.os == 'Windows'
        run: go test ./...

      - name: Resolve Artifact Name
        id: artifact
        if: matrix.kind != 'windows'
        shell: bash
        run: |
          name="$(make ${{ matrix.print }})"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Resolve Windows Artifact Names
        id: windows-artifacts
        if: matrix.kind == 'windows'
        shell: bash
        run: |
          echo "x64=$(make print-windows-artifact)" >> "$GITHUB_OUTPUT"
          echo "x86=$(make print-windows-386-artifact)" >> "$GITHUB_OUTPUT"
          echo "app_embedded=$(make print-windows-app-embedded-artifact)" >> "$GITHUB_OUTPUT"
          echo "service_embedded=$(make print-windows-service-embedded-artifact)" >> "$GITHUB_OUTPUT"

      - name: Build Wails App
        if: runner.os != 'Linux' && matrix.kind != 'windows'
        shell: bash
        run: make ${{ matrix.target }}

      - name: Build Wails App
        if: matrix.kind == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          # Generate every Windows service helper variant before wails build
          # runs. The helpers are gitignored, so a fresh CI checkout has no
          # copy until the Makefile produces them. build-windows-service-*
          # all write to the same SERVICE_ARTIFACT path, so we must run
          # the dependency-generating target once per wails build that
          # embeds a helper.
          make build-windows-service-amd64
          make build-windows
          make build-windows-service-386
          make build-windows-386
          make build-windows-service-embedded-amd64
          make build-windows-app-mihomo
          make build-windows-service-mihomo

      - name: Build Wails App
        if: runner.os == 'Linux'
        shell: bash
        run: xvfb-run -a make ${{ matrix.target }}

      - name: Package Artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          name="${{ steps.artifact.outputs.name }}"
          find_7z() {
            if command -v 7z >/dev/null 2>&1; then
              command -v 7z
              return
            fi
            if command -v 7zz >/dev/null 2>&1; then
              command -v 7zz
              return
            fi
            if [ -x "/c/Program Files/7-Zip/7z.exe" ]; then
              printf '%s\n' "/c/Program Files/7-Zip/7z.exe"
              return
            fi
            if [ -x "/c/Program Files (x86)/7-Zip/7z.exe" ]; then
              printf '%s\n' "/c/Program Files (x86)/7-Zip/7z.exe"
              return
            fi
            echo "7z not found" >&2
            return 1
          }
          case "${{ matrix.kind }}" in
            windows)
              sevenzip="$(find_7z)"
              for name in "$(make print-windows-artifact)" "$(make print-windows-386-artifact)" "$(make print-windows-app-embedded-artifact)" "$(make print-windows-service-embedded-artifact)"; do
                (cd build/bin && "$sevenzip" a -tzip "../../release/$name.zip" "$name")
              done
              ;;
            linux)
              name="${{ steps.artifact.outputs.name }}"
              chmod +x "build/bin/$name"
              tar -C build/bin -czf "release/$name.tar.gz" "$name"
              ;;
            macos)
              name="${{ steps.artifact.outputs.name }}"
              sevenzip="$(find_7z)"
              app_dir="$(find build/bin -maxdepth 1 -name '*.app' -type d | head -n 1)"
              if [ -n "$app_dir" ]; then
                (cd build/bin && "$sevenzip" a -tzip "../../release/$name.zip" "$(basename "$app_dir")")
              else
                cp "build/bin/$name" "release/$name"
              fi
              ;;
          esac

      - name: Upload Artifact
        if: matrix.kind != 'windows'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            release/*.zip
            release/*.tar.gz
          if-no-files-found: error

      - name: Upload Windows x64 Artifact
        if: matrix.kind == 'windows'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.windows-artifacts.outputs.x64 }}
          path: release/${{ steps.windows-artifacts.outputs.x64 }}.zip
          if-no-files-found: error

      - name: Upload Windows x86 Artifact
        if: matrix.kind == 'windows'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.windows-artifacts.outputs.x86 }}
          path: release/${{ steps.windows-artifacts.outputs.x86 }}.zip
          if-no-files-found: error

      - name: Upload Windows App Embedded x64 Artifact
        if: matrix.kind == 'windows'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.windows-artifacts.outputs.app_embedded }}
          path: release/${{ steps.windows-artifacts.outputs.app_embedded }}.zip
          if-no-files-found: error

      - name: Upload Windows Service Embedded x64 Artifact
        if: matrix.kind == 'windows'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.windows-artifacts.outputs.service_embedded }}
          path: release/${{ steps.windows-artifacts.outputs.service_embedded }}.zip
          if-no-files-found: error

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          path: release
          merge-multiple: true

      - name: List Release Files
        run: ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
