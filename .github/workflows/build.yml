name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            cmake
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-nghttp3

      - name: Build Windows
        shell: msys2 {0}
        env:
          CMAKE_GENERATOR: MSYS Makefiles
        run: |
          cmake -S . -B build-windows
          cmake --build build-windows

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulse-windows-x64
          path: |
            bin/vless_proxy.exe
            bin/*.dll
            config/config.toml.example

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config autoconf automake libtool perl curl git ca-certificates

      - name: Make build_linux_deps.sh executable
        run: |
          chmod +x scripts/build_linux_deps.sh
          chmod +x third_party/src/openssl-openssl-3.6.2/Configure

      - name: Build Linux dependencies
        run: |
          ./scripts/build_linux_deps.sh

      - name: Build Linux
        run: |
          make OBJ_DIR=obj/linux BIN_DIR=bin/linux clean
          make OBJ_DIR=obj/linux BIN_DIR=bin/linux

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulse-linux-x64
          path: |
            bin/linux/vless_proxy
            bin/linux/lib/**
            config/config.toml.example
