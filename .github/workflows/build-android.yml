name: Build Android

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        run: |
          NDK_VERSION="27.0.12077973"
          NDK_DIR="$ANDROID_HOME/ndk/$NDK_VERSION"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;$NDK_VERSION"
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$NDK_DIR" >> $GITHUB_ENV
          # Verify toolchain
          ls -la "$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"

      - name: Sync third-party sources
        run: |
          chmod +x scripts/sync_third_party.sh
          ./scripts/sync_third_party.sh all

      - name: Download Country.mmdb
        run: |
          mkdir -p android/app/src/main/assets
          curl -fsSL -o android/app/src/main/assets/Country.mmdb \
            https://github.com/Dreamacro/maxmind-geoip/releases/latest/download/Country.mmdb
          ls -lh android/app/src/main/assets/Country.mmdb

      - name: Cross-compile native binary (arm64-v8a)
        run: |
          chmod +x android/native/build-android.sh
          ./android/native/build-android.sh

      - name: Collect native binaries into jniLibs
        run: |
          chmod +x android/native/collect-binaries.sh
          ./android/native/collect-binaries.sh
          ls -lhR android/app/src/main/jniLibs/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          build-root-directory: android

      - name: Configure Android SDK path
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> android/local.properties

      - name: Build APK
        working-directory: android
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.11.1
          fi
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign Release
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        if: ${{ env.SIGNING_KEY != '' }}
        continue-on-error: true
        uses: kevin-david/zipalign-sign-android-release@v2
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          zipAlign: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulse-android-apk
          path: |
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload native binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulse-android-binaries
          path: |
            android/native/build/install/*/bin/vless_proxy
          retention-days: 30
