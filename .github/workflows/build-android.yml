name: Build Android

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:
    inputs:
      version:
        description: Fixed Pulse version name, for example P123 or 1.2.0-P123
        required: false
        type: string
      version_code:
        description: Fixed Android versionCode
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Prepare Android SDK
        shell: bash
        run: |
          set -euo pipefail
          set +e
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          sdkmanager_status=${PIPESTATUS[1]}
          set -e
          if [ "$sdkmanager_status" -ne 0 ]; then
            exit "$sdkmanager_status"
          fi
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;23.2.8568313"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/23.2.8568313" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/23.2.8568313" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: android

      - name: Configure Android SDK path
        shell: bash
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build APK
        shell: bash
        env:
          PULSE_VERSION: ${{ inputs.version }}
          PULSE_VERSION_CODE: ${{ inputs.version_code }}
        run: |
          set -euo pipefail
          chmod +x android/gradlew android/native/build-android.sh android/native/collect-binaries.sh
          make_args=()
          if [ -n "$PULSE_VERSION" ]; then
            make_args+=("VERSION=$PULSE_VERSION")
          fi
          if [ -n "$PULSE_VERSION_CODE" ]; then
            make_args+=("ANDROID_VERSION_CODE=$PULSE_VERSION_CODE")
          fi
          make build-android "${make_args[@]}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: pulse-android-apk
          path: build/bin/Pulse-*-android-arm64-v8a.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          apk="$(find build/bin -maxdepth 1 -name 'Pulse-*-android-arm64-v8a.apk' -type f | head -n 1)"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Pulse Android build"
          fi
          gh release upload "$tag" "$apk" --clobber

      - name: Upload native core artifact
        uses: actions/upload-artifact@v5
        with:
          name: pulse-android-native-core
          path: android/native/build/arm64-v8a/libpulsecore.so
          if-no-files-found: error
          retention-days: 30
